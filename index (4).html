<script>
// Minimal Supabase client - no external dependencies needed
window.supabase = {
  createClient: function(url, key) {
    const headers = {
      'Content-Type': 'application/json',
      'apikey': key,
      'Authorization': 'Bearer ' + key,
      'Prefer': 'return=representation'
    };
    let realtimeWs = null;
    const client = {
      from: function(table) {
        return {
          select: function(cols) {
            cols = cols || '*';
            return {
              order: function(col, opts) {
                const asc = opts && opts.ascending === false ? 'desc' : 'asc';
                return fetch(url+'/rest/v1/'+table+'?select='+cols+'&order='+col+'.'+asc, {headers})
                  .then(r=>r.json()).then(data=>({data:Array.isArray(data)?data:[], error:data.error||null}));
              },
              limit: function(n) {
                return fetch(url+'/rest/v1/'+table+'?select='+cols+'&limit='+n, {headers})
                  .then(r=>r.json()).then(data=>({data:Array.isArray(data)?data:[], error:data.error||null}));
              },
              then: function(resolve) {
                return fetch(url+'/rest/v1/'+table+'?select='+cols, {headers})
                  .then(r=>r.json()).then(data=>resolve({data:Array.isArray(data)?data:[], error:data.error||null}));
              }
            };
          },
          upsert: function(record, opts) {
            const h = {...headers, 'Prefer': 'resolution=merge-duplicates,return=representation'};
            return fetch(url+'/rest/v1/'+table, {method:'POST', headers:h, body:JSON.stringify(record)})
              .then(r=>r.ok?{error:null}:r.json().then(e=>({error:e})));
          },
          delete: function() {
            return {
              eq: function(col, val) {
                return fetch(url+'/rest/v1/'+table+'?'+col+'=eq.'+val, {method:'DELETE', headers})
                  .then(r=>r.ok?{error:null}:r.json().then(e=>({error:e})));
              }
            };
          }
        };
      },
      channel: function(name) {
        // Simple polling fallback for realtime
        return {
          on: function(event, filter, cb) { 
            this._cb = cb;
            return this; 
          },
          subscribe: function() {
            // Poll every 10 seconds for updates
            this._interval = setInterval(() => { if(this._cb) this._cb(); }, 10000);
            return this;
          },
          _unsubscribe: function() { clearInterval(this._interval); }
        };
      },
      removeChannel: function(ch) { if(ch && ch._unsubscribe) ch._unsubscribe(); }
    };
    return client;
  }
};
</script>

// ─── SUPABASE CRUD ───────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const resp = await fetch(
      SUPABASE_URL + '/rest/v1/orders?select=*&order=created_at.desc',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (resp.ok) { const d = await resp.json(); orders = Array.isArray(d) ? d : []; }
  } catch(e) { orders = JSON.parse(localStorage.getItem('ct_orders_v1') || '[]'); }
}

async function saveOrder(rec) {
  try {
    const resp = await fetch(SUPABASE_URL + '/rest/v1/orders', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=representation'
      },
      body: JSON.stringify(rec)
    });
    if (!resp.ok) throw new Error('Save failed');
    return true;
  } catch(e) {
    // fallback to localStorage
    const existing = orders.findIndex(o => o.id === rec.id);
    if (existing >= 0) orders[existing] = rec; else orders.unshift(rec);
    localStorage.setItem('ct_orders_v1', JSON.stringify(orders));
    return true;
  }
}

    });
  } catch(e) {}
  orders = orders.filter(o => o.id !== id);
  localStorage.setItem('ct_orders_v1', JSON.stringify(orders));
}

const SUPABASE_URL = 'https://phmkcxkgruhxrprotvat.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobWtjeGtncnVoeHJwcm90dmF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDk3MTcsImV4cCI6MjA5NDgyNTcxN30.J8BGamimXhWccj_p6f5QxvsQ3RUJhXpDcCxEdsJljOs';

async function loadContainers() {
  const { data, error } = await sbClient.from('containers').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Error loading data: ' + error.message); return; }

async function upsertContainer(rec) {
  const { error } = await sbClient.from('containers').upsert(rec, { onConflict: 'id' });
  if (error) { showToast('Save error: ' + error.message); return false; }

  const { error } = await sbClient.from('containers').delete().eq('id', id);

function subscribeRealtime() {
  // Fast polling every 2 seconds - detects changes immediately
  if (realtimeChannel) clearInterval(realtimeChannel);
  let lastHash = JSON.stringify(containers);
  realtimeChannel = setInterval(async () => {
    try {
      const SUPABASE_URL = 'https://phmkcxkgruhxrprotvat.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobWtjeGtncnVoeHJwcm90dmF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDk3MTcsImV4cCI6MjA5NDgyNTcxN30.J8BGamimXhWccj_p6f5QxvsQ3RUJhXpDcCxEdsJljOs';
      const resp = await fetch(
        SUPABASE_URL + '/rest/v1/containers?select=*&order=created_at.desc',
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
      );
      if (!resp.ok) return;
      const fresh = await resp.json();
      const freshHash = JSON.stringify(fresh);
      if (freshHash !== lastHash) {
        lastHash = freshHash;
        containers = fresh;
        renderApp();
        showToast('Stock updated!');
      }
    } catch(e) {}
  }, 2000);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function sKey(c) {
  if (c.arrival_date) return 'arrived';
  if (c.full_pay_date) return 'paid';
  if (c.adv_pay_date) return 'partial';
  return 'pending';
}
function sBadge(c) {
  const k = sKey(c);
  const l = { arrived: 'Arrived', paid: 'Fully paid', partial: 'Advance paid', pending: 'Pending' };
  return `<span class="badge ${k}">${l[k]}</span>`;
}
function fmt(d) { return d ? d.replace(/-/g, '/') : '—'; }
function money(v) { return v ? '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—'; }
function availQty(it) { return Math.max(0, Number(it.qty || 0) - (it.sales || []).reduce((s, x) => s + Number(x.qty || 0), 0)); }
function soldQty(it) { return (it.sales || []).reduce((s, x) => s + Number(x.qty || 0), 0); }
function stockPct(it) { const o = Number(it.qty || 0); return o ? Math.round((availQty(it) / o) * 100) : 0; }
function stockChip(it) {
  const a = availQty(it), p = stockPct(it);
  if (a <= 0) return `<span class="avail-chip avail-out">Out of stock</span>`;
  if (p <= 20) return `<span class="avail-chip avail-low">${a.toFixed(1)} m² left</span>`;
  return `<span class="avail-chip avail-ok">${a.toFixed(1)} m² available</span>`;
}
function totalM2(c) { const t = (c.items || []).reduce((s, i) => s + Number(i.qty || 0), 0); return t > 0 ? t.toFixed(1) : null; }
function availM2(c) { const t = (c.items || []).reduce((s, i) => s + availQty(i), 0); return t > 0 ? t.toFixed(1) : null; }
function filtered() {
  return containers.filter(c => {
    const q = searchQ.toLowerCase();
    const mQ = !q || c.container_no.toLowerCase().includes(q) || (c.client || '').toLowerCase().includes(q) || (c.origin || '').toLowerCase().includes(q);
    return mQ && (filterStatus === 'all' || sKey(c) === filterStatus);
  });
}
function gStats() {
  const avail = containers.reduce((s, c) => (c.items || []).reduce((ss, i) => ss + availQty(i), s), 0);
  const sold = containers.reduce((s, c) => (c.items || []).reduce((ss, i) => ss + soldQty(i), s), 0);
  return { total: containers.length, arrived: containers.filter(c => sKey(c) === 'arrived').length, avail: avail.toFixed(1), sold: sold.toFixed(1) };
}
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
function gv(id) { const e = document.getElementById(id); return e ? e.value : ''; }
function closeAll() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
}

async function saveRec() {
  const containerNo = gv('f_cn').trim().toUpperCase();
  const client = gv('f_cli').trim();
  if (!containerNo || !client) { alert('Container number and client are required.'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const existing = editId ? containers.find(x => x.id === editId) : {};
  const merged = editItems.map((it, i) => {
    const orig = existing && existing.items && existing.items[i];
    return { ...it, sales: (orig && orig.sales) ? orig.sales : (it.sales || []) };
  });
  const rec = {
    id: editId || Date.now().toString(),
    container_no: containerNo, client, material: gv('f_mat'), origin: gv('f_ori').trim(),
    adv_pay_date: gv('f_apd') || null, adv_amount: gv('f_apa') ? Number(gv('f_apa')) : null,
    full_pay_date: gv('f_fpd') || null, total_amount: gv('f_tot') ? Number(gv('f_tot')) : null,
    depart_date: gv('f_dep') || null, arrival_date: gv('f_arr') || null,
    notes: gv('f_nts').trim(), items: merged
  };
  const ok = await upsertContainer(rec);
  if (ok) {
    if (editId) containers = containers.map(c => c.id === editId ? rec : c); else containers.unshift(rec);
    document.getElementById('formOverlay').classList.remove('open');
    editId = null; aiData = null; aiState = null; editItems = [];
    renderApp(); showToast('✓ Container saved');
  } else { btn.disabled = false; btn.textContent = '✓ Save'; }
}

async function handleInvoice(e){
  const file=e.target.files[0];if(!file)return;
  aiState='loading';aiData=null;
  document.getElementById('aib').innerHTML=aiBar();

  try{
    // Get API key
    let apiKey=localStorage.getItem('ct_anthropic_v1')||window._apiKey||'';
    if(!apiKey){
      const k=prompt('Enter your Anthropic API key (console.anthropic.com → API Keys):','');
      if(!k){aiState='err';activeTab='invoice';openForm();return;}
      localStorage.setItem('ct_anthropic_v1',k);window._apiKey=k;
      apiKey=k;
    }

    const fname=file.name.toLowerCase();
    const isDocx=fname.endsWith('.docx');
    const isExcel=fname.endsWith('.xlsx')||fname.endsWith('.xls');
    const isXls=fname.endsWith('.xls');
    const isXlsx=fname.endsWith('.xlsx');
    const isPDF=fname.endsWith('.pdf')||file.type==='application/pdf';
    const isImg=fname.endsWith('.jpg')||fname.endsWith('.jpeg')||fname.endsWith('.png');

    const PROMPT='You are parsing a shipping invoice for stone/marble import. Return ONLY a valid JSON object, no markdown, no explanation.\n\nExtract these fields (use null if not found):\n- containerNo: container number (e.g. MRKU9012921)\n- material: Marble|Granite|Sinterized stone|Mixed|null\n- origin: port or city in China\n- client: buyer/consignee company name\n- totalAmount: invoice total as number\n- departDate: departure date YYYY-MM-DD\n- advPayDate: advance payment date YYYY-MM-DD\n- advAmount: advance amount as number\n- notes: invoice number or key reference (under 80 chars)\n- items: array of products, each with:\n  - colorName: product/color name\n  - color: hex color code for that stone (e.g. white=#f5f0eb, black=#2a2a2a, grey=#888)\n  - finish: surface finish (Polished/Matt/Honed/Brushed)\n  - thickness: slab thickness (e.g. 12mm, 2cm)\n  - qty: quantity in m² as number\n  - unitPrice: price per m² as number\n\nReturn ONLY the JSON.';

    let messages=[];

    if(isDocx){
      // Load JSZip to open the docx (which is a zip file)
      if(!window.JSZip){
        await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
      }
      const ab=await file.arrayBuffer();
      const zip=await window.JSZip.loadAsync(ab);

      // Try to get text first
      let docText='';
      if(zip.files['word/document.xml']){
        const xml=await zip.files['word/document.xml'].async('string');
        docText=xml.replace(/<w:t[^>]*>/g,' ').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
      }

      // Get images embedded in the document
      const mediaFiles=Object.keys(zip.files).filter(n=>
        n.startsWith('word/media/')&&(n.endsWith('.png')||n.endsWith('.jpg')||n.endsWith('.jpeg'))
      ).slice(0,2); // max 2 images to stay under API limits

      const blocks=[];
      if(docText.length>100){
        blocks.push({type:'text',text:'Document text:\n'+docText.slice(0,3000)+'\n\n'});
      }
      for(const mf of mediaFiles){
        const imgB64=await zip.files[mf].async('base64');
        const mt=mf.endsWith('.png')?'image/png':'image/jpeg';
        blocks.push({type:'image',source:{type:'base64',media_type:mt,data:imgB64}});
      }
      blocks.push({type:'text',text:PROMPT});
      messages=[{role:'user',content:blocks}];

    } else if(isXls||isXlsx){
      // Load SheetJS — handles both .xls and .xlsx
      if(!window.XLSX){
        await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
      }
      const ab=await file.arrayBuffer();
      const wb=window.XLSX.read(new Uint8Array(ab),{
        type:'array',
        cellFormulas:false,
        cellHTML:false,
        cellDates:true
      });
      let allText='';
      for(const sheetName of wb.SheetNames){
        const ws=wb.Sheets[sheetName];
        const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false,raw:false});
        const useful=rows.filter(r=>r.some(c=>String(c||'').trim()!==''));
        if(useful.length){
          allText+=`Sheet: ${sheetName}\n`;
          useful.forEach(r=>{
            const line=r.slice(0,15).map(c=>String(c||'').trim()).filter(c=>c).join(' | ');
            if(line)allText+=line+'\n';
          });
          allText+='\n';
        }
      }
      if(!allText.trim())throw new Error('Excel file appears empty or could not be read');
      messages=[{role:'user',content:[{type:'text',text:'Shipping invoice from Excel file:\n\n'+allText+'\n\n'+PROMPT}]}];

    } else if(isPDF){
      const b64=await toB64(file);
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:PROMPT}
      ]}];

    } else if(isImg){
      const b64=await toB64(file);
      const mt=fname.endsWith('.png')?'image/png':'image/jpeg';
      messages=[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mt,data:b64}},
        {type:'text',text:PROMPT}
      ]}];

    } else {
      throw new Error('Unsupported file type. Please use PDF, Word (.docx), Excel (.xls/.xlsx), JPG or PNG.');
    }

    // Call Anthropic API
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,messages})
    });

    if(!resp.ok){
      const err=await resp.json().catch(()=>({error:{message:'HTTP '+resp.status}}));
      throw new Error(err.error?.message||'API error '+resp.status);
    }

    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);

    const txt=data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    aiData=parsed;
    if(parsed.items&&parsed.items.length){
      editItems=parsed.items.map(it=>({
        color:it.color||'#cccccc',
        colorName:it.colorName||'',
        finish:it.finish||'',
        thickness:it.thickness||'',
        qty:it.qty||'',
        unitPrice:it.unitPrice||'',
        sales:[]
      }));
    }
    aiState='ok';

  }catch(err){
    console.error('Invoice read error:',err);
    aiState='err';
    // Show specific error to help debug
    const aib=document.getElementById('aib');
    if(aib)aib.innerHTML=`<div class="ai-bar err">⚠ Could not read invoice: ${err.message||'Unknown error'}. Try saving as PDF and uploading that instead.</div>`;
    activeTab='invoice';openForm();
    return;
  }
  activeTab='info';openForm();
}

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=res;
    s.onerror=()=>rej(new Error('Failed to load: '+src));
    document.head.appendChild(s);
  });
}


function toB64(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = () => rej(new Error('Read failed')); r.readAsDataURL(file); }); }

async function confirmSell() {
  const c = containers.find(x => x.id === sellContainerId);
  const buyer = document.getElementById('sb').value.trim();
  const date = document.getElementById('sd').value || new Date().toISOString().slice(0, 10);
  const note = document.getElementById('sn').value.trim();
  let any = false; let errs = [];
  c.items.forEach((it, i) => {
    const qty = Number(sellQtys[i] || 0); if (qty <= 0) return;
    const av = availQty(it);
    if (qty > av) { errs.push(`"${it.colorName}" — only ${av.toFixed(1)} m² available`); return; }
    if (!it.sales) it.sales = [];
    it.sales.push({ id: Date.now().toString() + i, qty, buyer, date, note, seller: currentSeller });
    any = true;
  });
  if (errs.length) { alert('Stock error:\n' + errs.join('\n')); return; }
  if (!any) { alert('Enter at least one quantity.'); return; }
  const btn = document.getElementById('confirmSell');
  btn.disabled = true; btn.textContent = 'Saving...';
  const ok = await upsertContainer(c);
  if (ok) {
    containers = containers.map(x => x.id === c.id ? c : x);
    document.getElementById('sellOverlay').classList.remove('open');
    sellQtys = {}; renderApp(); showToast('✓ Sale recorded by ' + currentSeller);
  } else { btn.disabled = false; btn.textContent = '✓ Confirm sale'; }
}

// ─── ORDERS MODULE ──────────────────────────────────────────────────────────

function orderStatus(o) {
  const paid = (o.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  const total = Number(o.total_usd || 0);
  if (paid <= 0) return 'pending';
  if (paid >= total) return 'paid';
  return 'partial';
}
function orderStatusBadge(o) {
  const s = orderStatus(o);
  const l = { pending: 'No payment', partial: 'Partial payment', paid: 'Fully paid' };
  const c = { pending: 'os-pending', partial: 'os-partial', paid: 'os-paid' };
  return `<span class="order-status ${c[s]}">${l[s]}</span>`;
}
function paidTotal(o) { return (o.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0); }
function balanceDue(o) { return Math.max(0, Number(o.total_usd || 0) - paidTotal(o)); }
function fmtMoney(v, cur) {
  if (!v) return '—';
  const n = Number(v);
  if (cur === 'COP') return '$' + n.toLocaleString('es-CO', {minimumFractionDigits: 0}) + ' COP';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' USD';
}

  app.innerHTML = `

      <div class="nav-tabs">
        <button class="nav-tab" onclick="currentTab='containers';renderApp()">📦 Containers</button>
        <button class="nav-tab active">🧾 Client Orders</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Total orders</div><div class="stat-val blue">${orders.length}</div></div>
        <div class="stat"><div class="stat-label">Fully paid</div><div class="stat-val green">${orders.filter(o=>orderStatus(o)==='paid').length}</div></div>
        <div class="stat"><div class="stat-label">Pending balance</div><div class="stat-val amber">$${totalPending.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
        <div class="stat"><div class="stat-label">Total collected</div><div class="stat-val blue">$${totalPaid.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
      </div>
      ${orders.length === 0 ? `<div class="empty">No client orders yet. Click + New order to add one.</div>` :
        orders.map(o => `
        <div class="order-card" data-oid="${o.id}">
          <div class="order-card-header">
            <span class="order-client">${o.client_name}</span>
            ${orderStatusBadge(o)}
          </div>
          <div class="order-meta">
            <span>📞 ${o.client_phone || '—'}</span>
            <span>📅 ${fmt(o.order_date)}</span>
            <span>👤 ${o.seller || '—'}</span>
          </div>
          <div class="order-amounts">
            <div class="amount-box"><label>Total order</label><strong>${fmtMoney(o.total_usd, 'USD')}</strong></div>
            <div class="amount-box"><label>Paid so far</label><strong style="color:#3B6D11">${fmtMoney(paidTotal(o), o.currency||'USD')}</strong></div>
            <div class="amount-box"><label>Balance due</label><strong style="color:${balanceDue(o)>0?'#BA7517':'#3B6D11'}">${fmtMoney(balanceDue(o), o.currency||'USD')}</strong></div>
            ${o.balance_due_date ? `<div class="amount-box"><label>Due date</label><strong>${fmt(o.balance_due_date)}</strong></div>` : ''}
          </div>
          <div style="margin-top:8px;font-size:12px;color:#888">
            ${(o.items||[]).map(it=>`${it.colorName} — ${it.qty} m² @ ${fmtMoney(it.unit_price, o.currency||'USD')}/m²`).join(' &nbsp;|&nbsp; ')}
          </div>
          <div style="display:flex;gap:6px;margin-top:10px">
            <button class="btn sm success" data-pay="${o.id}">+ Add payment</button>
            <button class="btn sm inv" data-oid="${o.id}">View details</button>
            <button class="btn sm danger" data-delord="${o.id}" style="margin-left:auto">🗑</button>
          </div>
        </div>`).join('')
      }
    </div>`;

  document.getElementById('addOrderBtn').onclick = () => { editOrderId = null; orderView = 'form'; renderOrders(); };
  document.querySelectorAll('[data-oid]').forEach(b => b.onclick = e => {
    if (e.target.dataset.oid) { orderDetailId = e.target.dataset.oid; orderView = 'detail'; renderOrders(); }
  });
  document.querySelectorAll('[data-pay]').forEach(b => b.onclick = e => {
    e.stopPropagation(); orderDetailId = b.dataset.pay; orderView = 'detail'; renderOrders();
    setTimeout(() => { const pb = document.getElementById('addPayBtn'); if(pb) pb.click(); }, 100);
  });
  document.querySelectorAll('[data-delord]').forEach(b => b.onclick = async e => {
    e.stopPropagation();
    if (!confirm('Delete this order?')) return;
    await deleteOrder(b.dataset.delord);
    renderOrders();
  });
}

function renderOrderForm() {
  const o = editOrderId ? orders.find(x => x.id === editOrderId) : {};
  const today = new Date().toISOString().slice(0,10);
  // Build items list from all containers
  const allItems = [];
  containers.forEach(c => {
    (c.items||[]).forEach(it => {
      allItems.push({ containerNo: c.container_no, containerId: c.id, colorName: it.colorName, finish: it.finish, thickness: it.thickness, availQty: availQty(it) });
    });
  });

  return `
    <div class="wrap">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <button class="btn" id="backOrderBtn">← Back</button>
        <h2 style="font-size:16px;font-weight:700">${editOrderId ? 'Edit order' : 'New client order'}</h2>
      </div>
      <div style="background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.5rem">
        <div class="form-grid" style="margin-bottom:1rem">
          <div class="fg full"><label>Client name *</label><input id="oc_name" placeholder="e.g. Pepe Rodriguez" value="${o.client_name||''}"></div>
          <div class="fg"><label>Phone / WhatsApp</label><input id="oc_phone" placeholder="+57 300 000 0000" value="${o.client_phone||''}"></div>
          <div class="fg"><label>Order date</label><input type="date" id="oc_date" value="${o.order_date||today}"></div>
          <div class="fg"><label>Currency</label>
            <select id="oc_currency">
              <option value="USD"${(o.currency||'USD')==='USD'?' selected':''}>USD (dollars)</option>
              <option value="COP"${o.currency==='COP'?' selected':''}>COP (pesos)</option>
            </select>
          </div>
          <div class="fg"><label>Balance due date</label><input type="date" id="oc_baldate" value="${o.balance_due_date||''}"></div>
          <div class="fg full"><label>Notes</label><input id="oc_notes" placeholder="Any special instructions..." value="${o.notes||''}"></div>
        </div>

        <div style="margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <strong style="font-size:13px">Materials ordered</strong>
            <button class="btn sm primary" id="addOrderItemBtn">+ Add material</button>
          </div>
          <div id="orderItemsSection">
            <table class="items-tbl" style="font-size:13px">
              <thead><tr>
                <th>Container</th><th>Color / Product</th><th>Qty (m²)</th><th>Price per m²</th><th>Subtotal</th><th style="width:36px"></th>
              </tr></thead>
              <tbody id="orderItemsBody">
                ${((o.items||[]).map((it,i) => orderItemRow(it, i, allItems))).join('')}
              </tbody>
            </table>
            <div id="orderTotal" style="text-align:right;margin-top:8px;font-size:14px;font-weight:700;color:#185FA5"></div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn" id="backOrderBtn2">Cancel</button>
          <button class="btn primary" id="saveOrderBtn">✓ ${editOrderId ? 'Save changes' : 'Create order'}</button>
        </div>
      </div>
    </div>`;
}

function orderItemRow(it, i, allItems) {
  const opts = allItems.map(a => `<option value="${a.containerId}|${a.colorName}|${a.finish}|${a.thickness}|${a.availQty}" ${(it.containerId===a.containerId&&it.colorName===a.colorName)?'selected':''}>${a.containerNo} — ${a.colorName} ${a.finish||''} (${a.availQty.toFixed(1)} m² avail)</option>`).join('');
  return `<tr id="oirow_${i}">
    <td colspan="2"><select class="oi-product" data-i="${i}" style="width:100%;font-size:12px;height:30px;border:0.5px solid #ccc;border-radius:6px;padding:0 6px;font-family:inherit"><option value="">Select material...</option>${opts}</select></td>
    <td><input type="number" class="oi-qty" data-i="${i}" value="${it.qty||''}" placeholder="m²" style="width:70px;height:28px;border:0.5px solid #ccc;border-radius:6px;padding:0 6px;font-size:12px;font-family:inherit"></td>
    <td><input type="number" class="oi-price" data-i="${i}" value="${it.unit_price||''}" placeholder="0.00" style="width:80px;height:28px;border:0.5px solid #ccc;border-radius:6px;padding:0 6px;font-size:12px;font-family:inherit"></td>
    <td class="oi-sub" data-i="${i}" style="font-weight:600;font-size:12px">${it.qty&&it.unit_price?'$'+(Number(it.qty)*Number(it.unit_price)).toFixed(2):'—'}</td>
    <td><button class="btn sm danger oi-del" data-i="${i}">🗑</button></td>
  </tr>`;
}

let orderItems = [];

function bindOrderForm() {
  const o = editOrderId ? orders.find(x => x.id === editOrderId) : {};
  orderItems = o.items ? JSON.parse(JSON.stringify(o.items)) : [];

  document.getElementById('backOrderBtn').onclick = () => { orderView = 'list'; renderOrders(); };
  document.getElementById('backOrderBtn2').onclick = () => { orderView = 'list'; renderOrders(); };
  document.getElementById('saveOrderBtn').onclick = saveOrderRec;
  document.getElementById('addOrderItemBtn').onclick = () => {
    orderItems.push({ containerId: '', colorName: '', finish: '', thickness: '', qty: '', unit_price: '' });
    refreshOrderItemsTable();
  };
  refreshOrderItemsTable();
}

function refreshOrderItemsTable() {
  const allItems = [];
  containers.forEach(c => {
    (c.items||[]).forEach(it => {
      allItems.push({ containerNo: c.container_no, containerId: c.id, colorName: it.colorName, finish: it.finish, thickness: it.thickness, availQty: availQty(it) });
    });
  });
  const tbody = document.getElementById('orderItemsBody');
  if (!tbody) return;
  tbody.innerHTML = orderItems.map((it, i) => orderItemRow(it, i, allItems)).join('');
  updateOrderTotal();
  document.querySelectorAll('.oi-product').forEach(sel => sel.onchange = e => {
    const i = Number(e.target.dataset.i);
    const val = e.target.value;
    if (val) {
      const [cid, colorName, finish, thickness] = val.split('|');
      orderItems[i] = { ...orderItems[i], containerId: cid, colorName, finish, thickness };
    }
  });
  document.querySelectorAll('.oi-qty').forEach(inp => inp.oninput = e => {
    orderItems[Number(e.target.dataset.i)].qty = e.target.value;
    updateOrderTotal();
  });
  document.querySelectorAll('.oi-price').forEach(inp => inp.oninput = e => {
    orderItems[Number(e.target.dataset.i)].unit_price = e.target.value;
    updateOrderTotal();
  });
  document.querySelectorAll('.oi-del').forEach(btn => btn.onclick = e => {
    orderItems.splice(Number(e.target.dataset.i || btn.dataset.i), 1);
    refreshOrderItemsTable();
  });
}

function updateOrderTotal() {
  const total = orderItems.reduce((s, it) => s + (Number(it.qty||0) * Number(it.unit_price||0)), 0);
  const el = document.getElementById('orderTotal');
  if (el) el.textContent = total > 0 ? 'Order total: $' + total.toFixed(2) : '';
  // Update subtotals
  document.querySelectorAll('.oi-sub').forEach(td => {
    const i = Number(td.dataset.i);
    const it = orderItems[i];
    if (it) td.textContent = it.qty && it.unit_price ? '$' + (Number(it.qty)*Number(it.unit_price)).toFixed(2) : '—';
  });
}

async function saveOrderRec() {
  const name = document.getElementById('oc_name').value.trim();
  if (!name) { alert('Client name is required.'); return; }
  const total = orderItems.reduce((s, it) => s + (Number(it.qty||0) * Number(it.unit_price||0)), 0);
  const existing = editOrderId ? orders.find(x => x.id === editOrderId) : {};
  const rec = {
    id: editOrderId || Date.now().toString(),
    client_name: name,
    client_phone: document.getElementById('oc_phone').value.trim(),
    order_date: document.getElementById('oc_date').value,
    currency: document.getElementById('oc_currency').value,
    balance_due_date: document.getElementById('oc_baldate').value || null,
    notes: document.getElementById('oc_notes').value.trim(),
    total_usd: total,
    items: orderItems,
    payments: existing.payments || [],
    seller: currentSeller,
    created_at: existing.created_at || new Date().toISOString()
  };
  const btn = document.getElementById('saveOrderBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  await saveOrder(rec);
  if (editOrderId) orders = orders.map(o => o.id === editOrderId ? rec : o);
  else orders.unshift(rec);
  orderView = 'list'; editOrderId = null; orderItems = [];
  renderOrders(); showToast('✓ Order saved');
}

function renderOrderDetail() {
  const o = orders.find(x => x.id === orderDetailId);
  if (!o) return '<div class="empty">Not found.</div>';
  const paid = paidTotal(o);
  const balance = balanceDue(o);
  const today = new Date().toISOString().slice(0,10);
  return `
    <div class="wrap">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
        <button class="btn" id="backODetail">← Back</button>
        <h2 style="font-size:16px;font-weight:700">${o.client_name}</h2>
        ${orderStatusBadge(o)}
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn sm" id="editOBtn">✏️ Edit</button>
        </div>
      </div>

      <div class="detail-section">
        <h3>Client info</h3>
        <div class="kv">
          <span class="kv-label">Name</span><span class="kv-val">${o.client_name}</span>
          <span class="kv-label">Phone</span><span class="kv-val">${o.client_phone||'—'}</span>
          <span class="kv-label">Order date</span><span class="kv-val">${fmt(o.order_date)}</span>
          <span class="kv-label">Seller</span><span class="kv-val">${o.seller||'—'}</span>
          <span class="kv-label">Currency</span><span class="kv-val">${o.currency||'USD'}</span>
          <span class="kv-label">Notes</span><span class="kv-val">${o.notes||'—'}</span>
        </div>
      </div>

      <div class="detail-section">
        <h3>Materials ordered</h3>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr>
            <th style="padding:6px 8px;background:transparent;font-size:11px;font-weight:700;color:#888;border-bottom:0.5px solid #e0e0da">Product</th>
            <th style="padding:6px 8px;background:transparent;font-size:11px;font-weight:700;color:#888;border-bottom:0.5px solid #e0e0da;text-align:right">Qty m²</th>
            <th style="padding:6px 8px;background:transparent;font-size:11px;font-weight:700;color:#888;border-bottom:0.5px solid #e0e0da;text-align:right">Price/m²</th>
            <th style="padding:6px 8px;background:transparent;font-size:11px;font-weight:700;color:#888;border-bottom:0.5px solid #e0e0da;text-align:right">Subtotal</th>
          </tr></thead>
          <tbody>
            ${(o.items||[]).map(it=>`<tr>
              <td style="padding:7px 8px;border-bottom:0.5px solid #f0f0ee"><strong>${it.colorName||'—'}</strong><div style="font-size:11px;color:#888">${[it.finish,it.thickness].filter(Boolean).join(' · ')}</div></td>
              <td style="padding:7px 8px;border-bottom:0.5px solid #f0f0ee;text-align:right">${it.qty} m²</td>
              <td style="padding:7px 8px;border-bottom:0.5px solid #f0f0ee;text-align:right">${fmtMoney(it.unit_price, o.currency||'USD')}</td>
              <td style="padding:7px 8px;border-bottom:0.5px solid #f0f0ee;text-align:right;font-weight:600">${fmtMoney(Number(it.qty||0)*Number(it.unit_price||0), o.currency||'USD')}</td>
            </tr>`).join('')}
          </tbody>
          <tfoot><tr>
            <td colspan="3" style="padding:8px;font-weight:700;text-align:right">Total order:</td>
            <td style="padding:8px;font-weight:700;color:#185FA5;text-align:right">${fmtMoney(o.total_usd, o.currency||'USD')}</td>
          </tr></tfoot>
        </table>
      </div>

      <div class="detail-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <h3 style="margin:0">Payment history</h3>
          <button class="btn sm success" id="addPayBtn">+ Add payment</button>
        </div>
        ${(o.payments||[]).length===0?'<p style="font-size:13px;color:#888">No payments recorded yet.</p>':''}
        ${(o.payments||[]).map(p=>`
          <div class="pay-row">
            <div>
              <strong>${fmtMoney(p.amount, o.currency||'USD')}</strong>
              <span style="color:#888;font-size:12px;margin-left:8px">${fmt(p.date)}</span>
              <span style="color:#aaa;font-size:11px;margin-left:8px">${p.method||''}</span>
              ${p.note?`<div style="font-size:11px;color:#888">${p.note}</div>`:''}
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="font-size:11px;color:#888">by ${p.by||'—'}</span>
              <button class="btn sm danger" data-delpay="${p.id}">🗑</button>
            </div>
          </div>`).join('')}

        <div style="margin-top:12px;padding-top:12px;border-top:0.5px solid #e0e0da">
          <div class="order-amounts">
            <div class="amount-box"><label>Total order</label><strong>${fmtMoney(o.total_usd, o.currency||'USD')}</strong></div>
            <div class="amount-box"><label>Total paid</label><strong style="color:#3B6D11">${fmtMoney(paid, o.currency||'USD')}</strong></div>
            <div class="amount-box"><label>Balance due</label><strong style="color:${balance>0?'#BA7517':'#3B6D11'}">${fmtMoney(balance, o.currency||'USD')}</strong></div>
            ${o.balance_due_date?`<div class="amount-box"><label>Due date</label><strong>${fmt(o.balance_due_date)}</strong></div>`:''}
          </div>
        </div>

        <div id="addPayForm" style="display:none;background:#f8f8f6;border-radius:10px;padding:14px;margin-top:12px">
          <strong style="font-size:13px;display:block;margin-bottom:10px">Record new payment</strong>
          <div class="form-grid">
            <div class="fg"><label>Amount (${o.currency||'USD'})</label><input type="number" id="pay_amount" placeholder="0.00"></div>
            <div class="fg"><label>Date</label><input type="date" id="pay_date" value="${today}"></div>
            <div class="fg"><label>Method</label>
              <select id="pay_method">
                <option>Bank transfer</option><option>Cash</option><option>Check</option><option>Other</option>
              </select>
            </div>
            <div class="fg"><label>Note (optional)</label><input id="pay_note" placeholder="Reference, receipt #..."></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button class="btn" id="cancelPayBtn">Cancel</button>
            <button class="btn success" id="confirmPayBtn">✓ Save payment</button>
          </div>
        </div>
      </div>
    </div>`;
}

function bindOrderDetail() {
  const o = orders.find(x => x.id === orderDetailId);
  document.getElementById('backODetail').onclick = () => { orderView = 'list'; renderOrders(); };
  document.getElementById('editOBtn').onclick = () => { editOrderId = orderDetailId; orderView = 'form'; renderOrders(); };
  
  const addPayBtn = document.getElementById('addPayBtn');
  const addPayForm = document.getElementById('addPayForm');
  if (addPayBtn) addPayBtn.onclick = () => { addPayForm.style.display = 'block'; addPayBtn.style.display = 'none'; };
  
  const cancelPayBtn = document.getElementById('cancelPayBtn');
  if (cancelPayBtn) cancelPayBtn.onclick = () => { addPayForm.style.display = 'none'; addPayBtn.style.display = ''; };

  const confirmPayBtn = document.getElementById('confirmPayBtn');
  if (confirmPayBtn) confirmPayBtn.onclick = async () => {
    const amount = document.getElementById('pay_amount').value;
    if (!amount || Number(amount) <= 0) { alert('Enter a valid amount.'); return; }
    if (!o.payments) o.payments = [];
    o.payments.push({
      id: Date.now().toString(),
      amount: Number(amount),
      date: document.getElementById('pay_date').value,
      method: document.getElementById('pay_method').value,
      note: document.getElementById('pay_note').value.trim(),
      by: currentSeller
    });
    confirmPayBtn.disabled = true; confirmPayBtn.textContent = 'Saving...';
    await saveOrder(o);
    orders = orders.map(x => x.id === o.id ? o : x);
    showToast('✓ Payment recorded');
    renderOrders();
  };

  document.querySelectorAll('[data-delpay]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this payment?')) return;
    o.payments = (o.payments||[]).filter(p => p.id !== b.dataset.delpay);
    await saveOrder(o);
    orders = orders.map(x => x.id === o.id ? o : x);
    renderOrders();
  });
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [];
  containers.forEach(c => {
    if (!c.items || !c.items.length) {
      rows.push([c.container_no, c.material || '', c.client || '', c.origin || '', '', '', '', '', '', sKey(c)].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
    } else {
      c.items.forEach(it => rows.push([c.container_no, c.material || '', c.client || '', c.origin || '', it.colorName || '', it.finish || '', it.thickness || '', Number(it.qty || 0).toFixed(1), availQty(it).toFixed(1), sKey(c)].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')));
    }
  });
  const h = '"Container #","Material","Client","Origin","Color","Finish","Thickness","Total m²","Available m²","Status"';
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent([h, ...rows].join('\n'));
  a.download = 'stock_' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
}

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
