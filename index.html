<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Stone Tracker">
<title>Stone Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f5f3;min-height:100vh;padding-bottom:80px}
.wrap{max-width:960px;margin:0 auto;padding:1rem}
/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.topbar h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
/* BOTTOM NAV (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0da;z-index:200;padding:8px 0 12px}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;border:none;background:none;font-size:10px;color:#888;cursor:pointer;font-family:inherit;border-radius:8px}
.bnav-btn.active{color:#185FA5}
.bnav-icon{font-size:22px;line-height:1}
/* DESKTOP TABS */
.nav-tabs{display:flex;gap:0;border-bottom:2px solid #e0e0da;margin-bottom:1.25rem;overflow-x:auto}
.nav-tab{padding:10px 20px;font-size:14px;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;color:#888;font-family:inherit;font-weight:500;margin-bottom:-2px;white-space:nowrap}
.nav-tab.active{color:#185FA5;border-bottom-color:#185FA5}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:12px;padding:12px 14px;border:0.5px solid #e0e0da}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.blue{color:#185FA5}.amber{color:#BA7517}.green{color:#3B6D11}.red{color:#A32D2D}
/* ALERTS */
.alert-banner{background:#FCEBEB;border:0.5px solid #f7c1c1;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#791F1F;display:flex;align-items:center;gap:8px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 14px;height:40px;border:0.5px solid #ccc;border-radius:10px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s;min-height:40px}
.btn:hover{background:#f0f0ee}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.primary:hover{background:#0C447C}
.btn.inv{border-color:#185FA5;color:#185FA5}
.btn.inv:hover{background:#e6f1fb}
.btn.success{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn.success:hover{background:#27500A}
.btn.wa{background:#25D366;color:#fff;border-color:#1ebe5d}
.btn.danger{background:#fff0f0;color:#A32D2D;border-color:#f7c1c1}
.btn.sm{height:32px;padding:0 10px;font-size:12px;min-height:32px}
.btn.icon{padding:0;width:36px;height:36px;justify-content:center;font-size:16px}
/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.toolbar input,.toolbar select{font-size:14px;height:40px;border:0.5px solid #ccc;border-radius:10px;padding:0 12px;background:#fff;color:#1a1a1a;font-family:inherit}
/* CONTAINER CARDS (mobile) */
.container-cards{display:none;flex-direction:column;gap:10px}
.container-card{background:#fff;border:0.5px solid #e0e0da;border-radius:14px;padding:14px;cursor:pointer;transition:box-shadow 0.15s;-webkit-tap-highlight-color:transparent}
.container-card:active{background:#f8f8f6}
.cc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cc-no{font-family:monospace;font-size:14px;font-weight:700}
.cc-meta{font-size:12px;color:#888;margin-bottom:8px}
.cc-stock{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.cc-stock-item{background:#f8f8f6;border-radius:8px;padding:6px 10px}
.cc-stock-label{font-size:10px;color:#888;text-transform:uppercase;font-weight:600}
.cc-stock-val{font-size:16px;font-weight:700}
.cc-actions{display:flex;gap:8px}
.cc-products{font-size:11px;color:#888;margin-top:6px;line-height:1.6}
.stock-bar-bg{background:#eee;border-radius:4px;height:6px;display:block;margin-top:4px}
.stock-bar-fill{height:6px;border-radius:4px}
/* DESKTOP TABLE */
.tbl-wrap{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;overflow:auto;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#f8f8f6;padding:10px;text-align:left;font-weight:600;font-size:11px;color:#666;border-bottom:0.5px solid #e0e0da;white-space:nowrap}
td{padding:10px;border-bottom:0.5px solid #f0f0ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.pending{background:#FAEEDA;color:#854F0B}
.badge.partial{background:#E6F1FB;color:#185FA5}
.badge.paid{background:#EAF3DE;color:#3B6D11}
.badge.arrived{background:#EEEDFE;color:#3C3489}
.avail-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.avail-ok{background:#EAF3DE;color:#3B6D11}
.avail-low{background:#FAEEDA;color:#854F0B}
.avail-out{background:#FCEBEB;color:#A32D2D}
.swatch{display:inline-block;border-radius:3px;border:0.5px solid #ddd;vertical-align:middle;flex-shrink:0}
/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto}
.overlay.open{display:flex}
.overlay .modal{position:relative;z-index:301;max-height:90vh;overflow-y:auto}
.modal{background:#fff;border-radius:16px;border:0.5px solid #ddd;padding:1.5rem;width:100%;max-width:600px;margin-top:1rem;min-width:320px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1rem}
/* FORM */
.tabs{display:flex;border-bottom:0.5px solid #e0e0da;margin-bottom:1rem;overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:#888;font-family:inherit;white-space:nowrap}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:11px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.03em}
.fg input,.fg select,.fg textarea{font-size:14px;height:42px;border:0.5px solid #ccc;border-radius:10px;padding:0 12px;background:#fff;color:#1a1a1a;font-family:inherit}
.fg textarea{height:60px;padding:10px 12px;resize:none}
.fg input.ai{border-color:#3B6D11;background:#f0f9ea}
/* UPLOAD ZONE */
.upload-zone{border:1.5px dashed #ccc;border-radius:12px;padding:1.25rem;text-align:center;cursor:pointer;position:relative;margin-bottom:0.75rem}
.upload-zone:hover{background:#f8f8f6}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{font-size:12px;color:#888;margin-top:6px}
/* AI BAR */
.ai-bar{border-radius:8px;padding:10px 14px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:0.75rem}
.ai-bar.loading{background:#e6f1fb;color:#0C447C}
.ai-bar.ok{background:#EAF3DE;color:#27500A}
.ai-bar.err{background:#FCEBEB;color:#791F1F}
.spinner{width:14px;height:14px;border:2px solid #B5D4F4;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
.spinner-lg{width:32px;height:32px;border:3px solid #e0e0da;border-top-color:#185FA5;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* ITEMS TABLE */
.items-tbl{width:100%;border-collapse:collapse;font-size:12px}
.items-tbl th{background:#f8f8f6;padding:7px 8px;text-align:left;font-weight:700;font-size:11px;color:#666;border-bottom:0.5px solid #e0e0da}
.items-tbl td{padding:6px 8px;border-bottom:0.5px solid #f0f0ee;vertical-align:middle}
.items-tbl tr:last-child td{border-bottom:none}
.items-tbl input{width:100%;font-size:12px;height:30px;border:0.5px solid #ccc;border-radius:6px;padding:0 6px;background:#fff;color:#1a1a1a;font-family:inherit}
.items-tbl input[type=color]{padding:1px 3px;height:30px;width:40px;cursor:pointer}
/* MODAL FOOTER */
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #f0f0ee}
/* EMPTY */
.empty{text-align:center;padding:3rem;color:#888;font-size:14px}
/* DETAIL */
.detail-section{background:#f8f8f6;border-radius:12px;padding:12px 14px;margin-bottom:0.75rem}
.detail-section h3{font-size:11px;font-weight:700;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:13px}
.kv-label{color:#888;font-size:12px}
.kv-val{font-weight:600}
/* SELL */
.sale-row{display:grid;grid-template-columns:20px 1fr auto auto;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #f0f0ee;font-size:13px}
.sale-row:last-child{border-bottom:none}
.sale-qty-input{width:80px;height:40px;font-size:15px;border:0.5px solid #ccc;border-radius:10px;padding:0 8px;background:#fff;color:#1a1a1a;text-align:center;font-family:inherit}
.sale-qty-input:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.15)}
/* ORDERS */
.order-card{background:#fff;border:0.5px solid #e0e0da;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow 0.15s}
.order-card:active{background:#f8f8f6}
.order-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.order-client{font-weight:700;font-size:16px}
.order-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.os-pending{background:#FAEEDA;color:#854F0B}
.os-partial{background:#E6F1FB;color:#185FA5}
.os-paid{background:#EAF3DE;color:#3B6D11}
.order-meta{font-size:12px;color:#888;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.order-amounts{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.amount-box{background:#f8f8f6;border-radius:8px;padding:8px 12px}
.amount-box label{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;display:block;margin-bottom:2px}
.amount-box strong{font-size:15px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #f0f0ee;font-size:13px}
.pay-row:last-child{border-bottom:none}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:1rem}
.dash-card{background:#fff;border:0.5px solid #e0e0da;border-radius:14px;padding:16px}
.dash-card h3{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px}
.dash-big{font-size:32px;font-weight:700;margin-bottom:4px}
.dash-sub{font-size:12px;color:#888}
.progress-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:6px}
.progress-bar-bg{background:#f0f0ee;border-radius:4px;height:8px;flex:1;margin:0 8px}
.progress-bar-fill{height:8px;border-radius:4px;background:#185FA5}
/* SELLER CHIP */
.seller-chip{display:flex;align-items:center;gap:6px;background:#fff;border:0.5px solid #e0e0da;border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;min-height:40px}
/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* RT DOT */
.rt-dot{width:8px;height:8px;background:#3B6D11;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* LOGIN */
.login-wrap{max-width:360px;margin:4rem auto;background:#fff;border-radius:16px;border:0.5px solid #e0e0da;padding:2rem;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
/* WHATSAPP CLIENT BTN */
/* MOBILE NAVIGATION */
@media(max-width:640px){
  #backODetail, #backOrderBtn, #backOrderBtn2{height:44px;font-size:15px;width:100%;justify-content:center;margin-bottom:8px}
  .modal-close-btn{
    position:fixed !important;
    top:12px !important;
    right:12px !important;
    z-index:9999 !important;
    width:44px !important;
    height:44px !important;
    border-radius:50% !important;
    background:#fff !important;
    border:0.5px solid #ccc !important;
    font-size:20px !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    box-shadow:0 2px 12px rgba(0,0,0,0.2) !important;
    cursor:pointer !important;
  }
  .modal h2{padding-right:50px}
}
.wa-client-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#25D366;color:#fff;border:none;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit}
/* MOBILE RESPONSIVE */
@media(max-width:640px){
  body{padding-bottom:90px}
  .bottom-nav{display:block}
  .nav-tabs{display:none}
  .tbl-wrap{display:none}
  .container-cards{display:flex}
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .topbar-actions .btn span{display:none}
  .wrap{padding:0.75rem}
  .modal{margin-top:0;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:100%;max-height:92vh;overflow-y:auto;padding:1rem}
  .overlay{align-items:flex-end;padding:0;background:rgba(0,0,0,0.5)}
  .stats{grid-template-columns:1fr 1fr}
  .order-amounts{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr}
  .upload-zone{min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
}
@media(min-width:641px){
  .bottom-nav{display:none}
  .container-cards{display:none!important}
  .tbl-wrap{display:block}
}


/* CLIENTS / PRICE LIST / QUOTES / SHIPPING */
.timeline{display:flex;flex-direction:column;gap:0;padding:8px 0}
.tl-step{display:flex;gap:12px;align-items:flex-start;padding:8px 0;position:relative}
.tl-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid #fff;box-shadow:0 0 0 2px #ccc}
.tl-dot.done{background:#3B6D11;box-shadow:0 0 0 2px #3B6D11}
.tl-dot.active{background:#185FA5;box-shadow:0 0 0 2px #185FA5;animation:pulse 2s infinite}
.tl-dot.pending{background:#e0e0da;box-shadow:0 0 0 2px #ccc}
.tl-line{position:absolute;left:7px;top:24px;bottom:-8px;width:2px;background:#e0e0da}
.tl-step:last-child .tl-line{display:none}
.price-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.quote-item-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:0.5px solid #f0f0ee;font-size:13px}
.quote-item-row:last-child{border-bottom:none}
/* PROSPECTS */
/* PROSPECTS */
.prospect-card{background:#fff;border:0.5px solid #e0e0da;border-radius:14px;padding:14px;margin-bottom:10px;transition:box-shadow 0.15s}
.prospect-card:active{background:#f8f8f6}
.ps-new{background:#E6F1FB;color:#185FA5}
.ps-visited{background:#FFF8E1;color:#7B5800}
.ps-interested{background:#EAF3DE;color:#3B6D11}
.ps-client{background:#EEEDFE;color:#3C3489}
.ps-notinterested{background:#f0f0ee;color:#888}
.visit-row{padding:8px 0;border-bottom:0.5px solid #f0f0ee;font-size:13px}
.visit-row:last-child{border-bottom:none}
</style>

<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<div class="overlay" id="formOverlay"><div class="modal" id="formModal"></div></div>
<div class="overlay" id="sellOverlay"><div class="modal" id="sellModal" style="max-width:540px"></div></div>
<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal" style="max-width:640px"></div></div>
<div class="overlay" id="histOverlay"><div class="modal" id="histModal" style="max-width:560px"></div></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://phmkcxkgruhxrprotvat.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobWtjeGtncnVoeHJwcm90dmF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNDk3MTcsImV4cCI6MjA5NDgyNTcxN30.J8BGamimXhWccj_p6f5QxvsQ3RUJhXpDcCxEdsJljOs';
const SELLER_KEY = 'ct_seller_v1';
const ANTHROPIC_KEY = 'ct_anthropic_v1';
const SB_HEADERS = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let containers = [], orders = [];
let currentSeller = null, currentTab = 'dashboard';
let filterStatus = 'all', searchQ = '';
let editId = null, aiData = null, aiState = null, activeTab = 'info', editItems = [];
let sellContainerId = null, sellQtys = {};
let histContainerId = null, detailId = null;
let orderView = 'list', editOrderId = null, orderDetailId = null, orderItems = [];
let realtimeInterval = null;
let monthlyDetailKey = null;
let clients = [];
let clientView = 'list';
let editClientId = null;
let clientDetailId = null;
let clientSearch = '';
let priceList = [];
let priceListView = 'list';
let editPriceId = null;
let quoteItems = [];
let quoteClientId = null;
let shippingEditId = null;
let prospects = [];
let prospectSearch = '';
let prospectFilter = 'all';
let prospectDetailId = null;
let editProspectId = null;

// ── DB ────────────────────────────────────────────────────────────────────────
async function dbGet(table) {
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?select=*&order=created_at.desc', {headers:SB_HEADERS});
    if (r.ok) return await r.json();
  } catch(e) {}
  return JSON.parse(localStorage.getItem('ct_'+table)||'[]');
}
async function dbSave(table, rec) {
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {method:'POST',headers:SB_HEADERS,body:JSON.stringify(rec)});
    if (r.ok) { localStorage.setItem('ct_'+table, JSON.stringify(table==='containers'?containers:orders)); return true; }
  } catch(e) {}
  localStorage.setItem('ct_'+table, JSON.stringify(table==='containers'?containers:orders));
  return true;
}
async function dbDelete(table, id) {
  try { await fetch(SUPABASE_URL+'/rest/v1/'+table+'?id=eq.'+id, {method:'DELETE',headers:SB_HEADERS}); } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function sKey(c){if(c.arrival_date)return'arrived';if(c.full_pay_date)return'paid';if(c.adv_pay_date)return'partial';return'pending';}
function sBadge(c){const k=sKey(c);const l={arrived:'Arrived',paid:'Fully paid',partial:'Advance paid',pending:'Pending'};return`<span class="badge ${k}">${l[k]}</span>`;}
function fmt(d){return d?d.replace(/-/g,'/'):'—';}
function money(v,cur){if(!v)return'—';const n=Number(v);if(cur==='COP')return'$'+n.toLocaleString('es-CO',{minimumFractionDigits:0})+' COP';return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+' USD';}
function availQty(it){return Math.max(0,Number(it.qty||0)-(it.sales||[]).reduce((s,x)=>s+Number(x.qty||0),0));}
function soldQty(it){return(it.sales||[]).reduce((s,x)=>s+Number(x.qty||0),0);}
function stockPct(it){const o=Number(it.qty||0);return o?Math.round((availQty(it)/o)*100):0;}
function totalM2(c){const t=(c.items||[]).reduce((s,i)=>s+Number(i.qty||0),0);return t>0?t.toFixed(1):null;}
function availM2(c){const t=(c.items||[]).reduce((s,i)=>s+availQty(i),0);return t>0?t.toFixed(1):null;}
function orderStatusKey(o){const paid=paidTotal(o);const total=Number(o.total_usd||0);if(paid<=0)return'pending';if(paid>=total)return'paid';return'partial';}
function orderStatusBadge(o){const s=orderStatusKey(o);const l={pending:'No payment',partial:'Partial payment',paid:'Fully paid'};const c={pending:'os-pending',partial:'os-partial',paid:'os-paid'};return`<span class="order-status ${c[s]}">${l[s]}</span>`;}
function paidTotal(o){return(o.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0);}
function balanceDue(o){return Math.max(0,Number(o.total_usd||0)-paidTotal(o));}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function lowStockItems(){return containers.flatMap(c=>(c.items||[]).filter(i=>stockPct(i)<=20&&Number(i.qty||0)>0).map(i=>({...i,containerNo:c.container_no})));}
function overdueOrders(){return orders.filter(o=>balanceDue(o)>0&&o.balance_due_date&&o.balance_due_date<new Date().toISOString().slice(0,10));}

// ── MONTHLY REPORT ───────────────────────────────────────────────────────────
function getMonthlyData() {
  const months = {};
  const now = new Date();

  // Get sales from containers
  containers.forEach(c => {
    (c.items || []).forEach(it => {
      (it.sales || []).forEach(s => {
        if (!s.date) return;
        const d = new Date(s.date);
        const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        if (!months[key]) months[key] = { key, year: d.getFullYear(), month: d.getMonth() + 1, soldM2: 0, salesCount: 0, collected: 0, paymentsCount: 0 };
        months[key].soldM2 += Number(s.qty || 0);
        months[key].salesCount++;
      });
    });
  });

  // Get payments from orders
  orders.forEach(o => {
    (o.payments || []).forEach(p => {
      if (!p.date) return;
      const d = new Date(p.date);
      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      if (!months[key]) months[key] = { key, year: d.getFullYear(), month: d.getMonth() + 1, soldM2: 0, salesCount: 0, collected: 0, paymentsCount: 0 };
      months[key].collected += Number(p.amount || 0);
      months[key].paymentsCount++;
    });
  });

  return Object.values(months).sort((a, b) => b.key.localeCompare(a.key));
}

// ── SHIPPING TRACKER ─────────────────────────────────────────────────────────
const SHIPPING_STEPS = [
  {key:'factory', label:'At factory', icon:'🏭'},
  {key:'loaded', label:'Loaded on ship', icon:'📦'},
  {key:'sea', label:'At sea', icon:'🌊'},
  {key:'port', label:'Arrived at port', icon:'⚓'},
  {key:'customs', label:'In customs', icon:'📋'},
  {key:'delivered', label:'Delivered', icon:'✅'}
];

function openShippingTracker(id) {
  const c = containers.find(x => x.id === id);
  if (!c) return;
  const shipping = c.shipping || {};
  const currentStep = shipping.currentStep || 'factory';
  const stepIdx = SHIPPING_STEPS.findIndex(s => s.key === currentStep);

  document.getElementById('formModal').innerHTML = `
    <h2>🚢 Shipping tracker — <span style="font-family:monospace;font-size:14px">${c.container_no}</span></h2>
    <div class="timeline">
      ${SHIPPING_STEPS.map((step, i) => {
        const isDone = i < stepIdx;
        const isActive = i === stepIdx;
        return `<div class="tl-step">
          <div class="tl-dot ${isDone?'done':isActive?'active':'pending'}"></div>
          <div class="tl-line"></div>
          <div style="flex:1">
            <div style="font-weight:${isActive?'700':'500'};font-size:14px;color:${isDone?'#3B6D11':isActive?'#185FA5':'#888'}">${step.icon} ${step.label}</div>
            ${shipping['date_'+step.key]?`<div style="font-size:11px;color:#888;margin-top:2px">${fmt(shipping['date_'+step.key])}</div>`:''}
            ${shipping['note_'+step.key]?`<div style="font-size:12px;color:#444;margin-top:2px;font-style:italic">${shipping['note_'+step.key]}</div>`:''}
          </div>
          ${!isDone?`<button class="btn sm ${isActive?'success':'inv'}" data-stepkey="${step.key}" data-stepidx="${i}" style="flex-shrink:0">${isActive?'✓ Current':'Set active'}</button>`:'<span style="color:#3B6D11;font-size:12px">✓ Done</span>'}
        </div>`;
      }).join('')}
    </div>
    <div class="fg full" style="margin-top:1rem">
      <label>Notes for current status</label>
      <input id="ship_note" placeholder="e.g. Expected arrival Dec 25" value="${shipping['note_'+currentStep]||''}">
    </div>
    <div class="fg" style="margin-top:10px">
      <label>Expected arrival date</label>
      <input type="date" id="ship_eta" value="${shipping.eta||c.arrival_date||''}">
    </div>
    <div class="modal-footer">
      <button class="btn" id="cancelShipBtn">Cancel</button>
      <button class="btn primary" id="saveShipBtn">✓ Save status</button>
    </div>`;

  document.getElementById('formOverlay').classList.add('open');
  document.getElementById('cancelShipBtn').onclick = () => document.getElementById('formOverlay').classList.remove('open');
  
  document.querySelectorAll('[data-stepkey]').forEach(btn => {
    btn.onclick = async () => {
      const key = btn.dataset.stepkey;
      const today = new Date().toISOString().slice(0,10);
      if (!c.shipping) c.shipping = {};
      c.shipping.currentStep = key;
      c.shipping['date_'+key] = today;
      c.shipping['note_'+key] = document.getElementById('ship_note').value.trim();
      c.shipping.eta = document.getElementById('ship_eta').value;
      await dbSave('containers', c);
      containers = containers.map(x => x.id === id ? c : x);
      document.getElementById('formOverlay').classList.remove('open');
      showToast('✓ Shipping status updated!');
      renderApp();
    };
  });

  document.getElementById('saveShipBtn').onclick = async () => {
    if (!c.shipping) c.shipping = {};
    c.shipping['note_'+currentStep] = document.getElementById('ship_note').value.trim();
    c.shipping.eta = document.getElementById('ship_eta').value;
    await dbSave('containers', c);
    containers = containers.map(x => x.id === id ? c : x);
    document.getElementById('formOverlay').classList.remove('open');
    showToast('✓ Saved!');
  };
}

function saveClients() { localStorage.setItem('ct_clients_v1', JSON.stringify(clients)); }

function getClientStats(clientName) {
  const clientOrders = orders.filter(o => o.client_name.toLowerCase() === clientName.toLowerCase());
  const totalSpent = clientOrders.reduce((s,o) => s+Number(o.total_usd||0), 0);
  const totalPaid = clientOrders.reduce((s,o) => s+paidTotal(o), 0);
  const totalBalance = clientOrders.reduce((s,o) => s+balanceDue(o), 0);
  const lastOrder = clientOrders.sort((a,b) => (b.order_date||'').localeCompare(a.order_date||''))[0];
  return { orderCount: clientOrders.length, totalSpent, totalPaid, totalBalance, lastOrder };
}

function renderQuoteItems() {
  const sec = document.getElementById('quoteItemsSection');
  if (!sec) return;
  if (quoteItems.length === 0) { sec.innerHTML = '<p style="font-size:13px;color:#888;text-align:center;padding:1rem">Add products above</p>'; return; }
  const cur = gv('q_currency') || 'USD';
  let total = 0;
  sec.innerHTML = quoteItems.map((it, i) => {
    const p = priceList.find(x => x.id === it.priceId);
    const unitPrice = p ? (cur==='COP'?Number(p.priceCOP||0):Number(p.priceUSD||0)) : 0;
    const disc = Number(it.discount||0);
    const finalPrice = unitPrice * (1 - disc/100);
    const subtotal = finalPrice * Number(it.qty||0);
    total += subtotal;
    return `<div class="quote-item-row">
      <select class="qi-product" data-i="${i}" style="font-size:12px;height:34px;border:0.5px solid #ccc;border-radius:8px;padding:0 8px;font-family:inherit">

      <input type="number" class="qi-qty" data-i="${i}" value="${it.qty||''}" placeholder="m²" style="width:60px;height:34px;border:0.5px solid #ccc;border-radius:8px;padding:0 6px;font-size:13px;font-family:inherit">

      <div style="text-align:right;font-size:12px;font-weight:600;min-width:60px">${subtotal>0?'$'+subtotal.toFixed(2):'—'}</div>
      <button class="btn sm danger qi-del" data-i="${i}">🗑</button>
    </div>`;
  }).join('') + (total>0?`<div style="text-align:right;font-size:14px;font-weight:700;color:#185FA5;padding:8px 0;border-top:0.5px solid #e0e0da;margin-top:4px">Total: ${cur==='COP'?'$'+total.toLocaleString('es-CO')+' COP':'$'+total.toFixed(2)+' USD'}</div>`:'');

  document.querySelectorAll('.qi-product').forEach(s => s.onchange = e => { quoteItems[Number(e.target.dataset.i)].priceId = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-qty').forEach(i => i.oninput = e => { quoteItems[Number(e.target.dataset.i)].qty = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-disc').forEach(i => i.oninput = e => { quoteItems[Number(e.target.dataset.i)].discount = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-del').forEach(b => b.onclick = () => { quoteItems.splice(Number(b.dataset.i),1); renderQuoteItems(); });
}

function generateQuote() {
  const clientName = gv('q_client') || 'Client';
  const date = gv('q_date') || new Date().toISOString().slice(0,10);
  const cur = gv('q_currency') || 'USD';
  const notes = gv('q_notes');
  const quoteNo = 'Q-' + Date.now().toString().slice(-6);

  let lines = [];
  let total = 0;
  quoteItems.forEach(it => {
    const p = priceList.find(x => x.id === it.priceId);
    if (!p || !it.qty) return;
    const unitPrice = cur==='COP'?Number(p.priceCOP||0):Number(p.priceUSD||0);
    const disc = Number(it.discount||0);
    const finalPrice = unitPrice * (1 - disc/100);
    const subtotal = finalPrice * Number(it.qty);
    total += subtotal;
    lines.push(`• ${p.colorName} ${p.finish||''} ${p.thickness||''}: ${it.qty} m² × ${cur==='COP'?'$'+finalPrice.toLocaleString('es-CO'):'$'+finalPrice.toFixed(2)}/m² = ${cur==='COP'?'$'+subtotal.toLocaleString('es-CO'):'$'+subtotal.toFixed(2)} ${cur}${disc>0?' ('+disc+'% discount)':''}`);
  });

  if (lines.length === 0) { alert('Add at least one product to the quote.'); return; }

  const text = [
    '*COTIZACIÓN ' + quoteNo + '*',
    'Groupitaly — Importadores de Piedra Natural',
    '',
    '*Cliente:* ' + clientName,
    '*Fecha:* ' + fmt(date),
    '',
    '*Productos:*',
    lines.join('\n'),
    '',
    '*TOTAL: ' + (cur==='COP' ? '$'+total.toLocaleString('es-CO')+' COP' : '$'+total.toFixed(2)+' USD') + '*',
    '',
    notes ? '*Notas:* '+notes : '',
    '_Precios válidos por 7 días. Sujeto a disponibilidad de stock._',
    '_Groupitaly — https://groupitaly.github.io/TRACKER_'
  ].filter(l => l !== undefined).join('\n');

  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  document.getElementById('formOverlay').classList.remove('open');
  showToast('✓ Quote sent to WhatsApp!');
}


// ── EXPORT MONTHLY EXCEL ─────────────────────────────────────────────────────
function exportMonthlyExcel(year) {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  
  // Sheet 1: Monthly summary
  const summaryRows = [
    ['Month', 'Total m² Sold', 'Number of Sales', 'Total Collected (USD)', 'Number of Payments']
  ];
  const data = getMonthlyData().filter(m => m.year === year);
  data.forEach(m => {
    summaryRows.push([
      monthNames[m.month-1] + ' ' + m.year,
      m.soldM2.toFixed(1),
      m.salesCount,
      m.collected.toFixed(2),
      m.paymentsCount
    ]);
  });
  summaryRows.push([
    'TOTAL ' + year,
    data.reduce((s,m)=>s+m.soldM2,0).toFixed(1),
    data.reduce((s,m)=>s+m.salesCount,0),
    data.reduce((s,m)=>s+m.collected,0).toFixed(2),
    data.reduce((s,m)=>s+m.paymentsCount,0)
  ]);

  // Sheet 2: All sales detail
  const salesRows = [
    ['Date', 'Month', 'Color/Product', 'Finish', 'Thickness', 'Container #', 'm² Sold', 'Buyer', 'Seller', 'Note']
  ];
  containers.forEach(c => {
    (c.items || []).forEach(it => {
      (it.sales || []).forEach(s => {
        if (!s.date) return;
        const d = new Date(s.date);
        if (d.getFullYear() !== year) return;
        salesRows.push([
          s.date,
          monthNames[d.getMonth()] + ' ' + year,
          it.colorName || '',
          it.finish || '',
          it.thickness || '',
          c.container_no,
          Number(s.qty || 0).toFixed(1),
          s.buyer || '',
          s.seller || '',
          s.note || ''
        ]);
      });
    });
  });

  // Sheet 3: All payments detail
  const paymentsRows = [
    ['Date', 'Month', 'Client', 'Amount (USD)', 'Currency', 'Method', 'Recorded by', 'Note']
  ];
  orders.forEach(o => {
    (o.payments || []).forEach(p => {
      if (!p.date) return;
      const d = new Date(p.date);
      if (d.getFullYear() !== year) return;
      paymentsRows.push([
        p.date,
        monthNames[d.getMonth()] + ' ' + year,
        o.client_name,
        Number(p.amount || 0).toFixed(2),
        o.currency || 'USD',
        p.method || '',
        p.by || '',
        p.note || ''
      ]);
    });
  });

  // Convert to CSV with multiple sections
  const toCSV = (rows) => rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  
  const fullCSV = 
    '=== MONTHLY SUMMARY ' + year + ' ===\n' +
    toCSV(summaryRows) + '\n\n' +
    '=== SALES DETAIL ' + year + ' ===\n' +
    toCSV(salesRows) + '\n\n' +
    '=== PAYMENTS DETAIL ' + year + ' ===\n' +
    toCSV(paymentsRows);

  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(fullCSV);
  a.download = 'monthly_report_' + year + '.csv';
  a.click();
  showToast('✓ Report exported — open with Excel!');
}

function bindItems(){

async function saveRec(){
  const containerNo=gv('f_cn').trim().toUpperCase();const client=gv('f_cli').trim();
  if(!containerNo||!client){alert('Container number and client are required.');return;}
  const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving...';
  const existing=editId?containers.find(x=>x.id===editId):{};
  const merged=editItems.map((it,i)=>{const orig=existing&&existing.items&&existing.items[i];return{...it,sales:(orig&&orig.sales)?orig.sales:(it.sales||[])};});
  const rec={id:editId||Date.now().toString(),container_no:containerNo,client,material:gv('f_mat'),origin:gv('f_ori').trim(),adv_pay_date:gv('f_apd')||null,adv_amount:gv('f_apa')?Number(gv('f_apa')):null,full_pay_date:gv('f_fpd')||null,total_amount:gv('f_tot')?Number(gv('f_tot')):null,depart_date:gv('f_dep')||null,arrival_date:gv('f_arr')||null,notes:gv('f_nts').trim(),items:merged,created_at:existing.created_at||new Date().toISOString()};
  await dbSave('containers',rec);
  if(editId)containers=containers.map(c=>c.id===editId?rec:c);else containers.unshift(rec);
  document.getElementById('formOverlay').classList.remove('open');
  editId=null;aiData=null;aiState=null;editItems=[];
  renderApp();showToast('✓ Container saved');
}

// ── INVOICE AI ────────────────────────────────────────────────────────────────
async function handleInvoice(e){
  const file=e.target.files[0];if(!file)return;
  aiState='loading';aiData=null;
  document.getElementById('aib').innerHTML=aiBar();
  try{
    let apiKey=localStorage.getItem(ANTHROPIC_KEY)||'';
    if(!apiKey){const k=prompt('Paste your Anthropic API key (console.anthropic.com → API Keys):','');if(!k){aiState='err';activeTab='invoice';openForm();return;}localStorage.setItem(ANTHROPIC_KEY,k);apiKey=k;}
    const fname=file.name.toLowerCase();
    const isDocx=fname.endsWith('.docx');
    const isExcel=fname.endsWith('.xlsx')||fname.endsWith('.xls');
    const isPDF=fname.endsWith('.pdf')||file.type==='application/pdf';
    const PROMPT='You are parsing a shipping invoice for stone/marble import. Return ONLY a valid JSON object, no markdown.\n\nExtract: container_no, material (Marble|Granite|Sinterized stone|Mixed|null), origin, client, total_amount (number), depart_date (YYYY-MM-DD), adv_pay_date (YYYY-MM-DD), adv_amount (number), notes (under 80 chars).\n\nitems array: colorName, color (hex for that stone), finish, thickness, qty (number m²), unitPrice (number per m²).\n\nReturn ONLY the JSON.';
    let messages=[];
    if(isDocx){
      if(!window.JSZip){await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');}
      const ab=await file.arrayBuffer();const zip=await window.JSZip.loadAsync(ab);
      let docText='';
      if(zip.files['word/document.xml']){const xml=await zip.files['word/document.xml'].async('string');docText=xml.replace(/<w:t[^>]*>/g,' ').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();}
      const mediaFiles=Object.keys(zip.files).filter(n=>n.startsWith('word/media/')&&(n.endsWith('.png')||n.endsWith('.jpg')||n.endsWith('.jpeg'))).slice(0,2);
      const blocks=[];
      if(docText.length>100)blocks.push({type:'text',text:'Document text:\n'+docText.slice(0,3000)+'\n\n'});
      for(const mf of mediaFiles){const imgB64=await zip.files[mf].async('base64');const mt=mf.endsWith('.png')?'image/png':'image/jpeg';blocks.push({type:'image',source:{type:'base64',media_type:mt,data:imgB64}});}
      blocks.push({type:'text',text:PROMPT});
      messages=[{role:'user',content:blocks}];
    } else if(isExcel){
      if(!window.XLSX){await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');}
      const ab=await file.arrayBuffer();
      const wb=window.XLSX.read(new Uint8Array(ab),{type:'array',cellFormulas:false,cellHTML:false,raw:false});
      let allText='';
      for(const name of wb.SheetNames){const ws=wb.Sheets[name];const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false,raw:false});const useful=rows.filter(r=>r.some(c=>String(c||'').trim()!==''));if(useful.length){allText+=`Sheet: ${name}\n`;useful.forEach(r=>{const line=r.slice(0,15).map(c=>String(c||'').trim()).filter(c=>c).join(' | ');if(line)allText+=line+'\n';});allText+='\n';}}
      if(!allText.trim())throw new Error('Excel file appears empty');
      messages=[{role:'user',content:[{type:'text',text:'Shipping invoice from Excel:\n\n'+allText+'\n\n'+PROMPT}]}];
    } else if(isPDF){
      const b64=await toB64(file);
      messages=[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:PROMPT}]}];
    } else {
      const b64=await toB64(file);const mt=fname.endsWith('.png')?'image/png':'image/jpeg';
      messages=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:PROMPT}]}];
    }
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:2000,messages})});
    if(!resp.ok){const err=await resp.json().catch(()=>({error:{message:'HTTP '+resp.status}}));throw new Error(err.error?.message||'API error');}
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const txt=data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    aiData=parsed;
    if(parsed.items&&parsed.items.length)editItems=parsed.items.map(it=>({color:it.color||'#cccccc',colorName:it.colorName||'',finish:it.finish||'',thickness:it.thickness||'',qty:it.qty||'',unitPrice:it.unitPrice||'',sales:[]}));
    aiState='ok';
  }catch(err){console.error(err);aiState='err';const aib=document.getElementById('aib');if(aib)aib.innerHTML=`<div class="ai-bar err">⚠ ${err.message||'Could not read invoice'}. Try saving as PDF and uploading that.</div>`;activeTab='invoice';openForm();return;}
  activeTab='info';openForm();
}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('Failed to load: '+src));document.head.appendChild(s);});}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(file);});}

async function syncOrderToContainers(rec, oldRec) {
  // First restore any previous order stock
  if (oldRec && oldRec.items) {
    for (const it of oldRec.items) {
      if (!it.containerId) continue;
      const c = containers.find(x => x.id === it.containerId);
      if (!c) continue;
      const ci = c.items.find(x => x.colorName === it.colorName && x.finish === it.finish);
      if (!ci) continue;
      ci.sales = (ci.sales || []).filter(s => s.orderId !== oldRec.id);
      await dbSave('containers', c);
      containers = containers.map(x => x.id === c.id ? c : x);
    }
  }
  // Now add new order stock deductions
  for (const it of rec.items) {
    if (!it.containerId || !it.qty || Number(it.qty) <= 0) continue;
    const c = containers.find(x => x.id === it.containerId);
    if (!c) continue;
    const ci = c.items.find(x => x.colorName === it.colorName && x.finish === it.finish);
    if (!ci) continue;
    // Check available stock
    const avail = availQty(ci);
    if (Number(it.qty) > avail) {
      alert(`Not enough stock for ${it.colorName}! Only ${avail.toFixed(1)} m² available.`);
      return false;
    }
    if (!ci.sales) ci.sales = [];
    // Remove old order sale if editing
    ci.sales = ci.sales.filter(s => s.orderId !== rec.id);
    // Add new sale
    ci.sales.push({
      id: 'ord_' + rec.id + '_' + Date.now(),
      qty: Number(it.qty),
      buyer: rec.client_name,
      date: rec.order_date || new Date().toISOString().slice(0,10),
      note: 'Client order',
      seller: rec.seller || currentSeller,
      orderId: rec.id
    });
    await dbSave('containers', c);
    containers = containers.map(x => x.id === c.id ? c : x);
  }
  return true;
}

async function saveOrderRec(){
  const name=gv('oc_name').trim();if(!name){alert('Client name is required.');return;}
  const total=orderItems.reduce((s,it)=>s+(Number(it.qty||0)*Number(it.unit_price||0)),0);
  const existing=editOrderId?orders.find(x=>x.id===editOrderId):{};
  const rec={id:editOrderId||Date.now().toString(),client_name:name,client_phone:gv('oc_phone').trim(),order_date:gv('oc_date'),currency:gv('oc_currency'),balance_due_date:gv('oc_baldate')||null,notes:gv('oc_notes').trim(),total_usd:total,items:orderItems,payments:existing.payments||[],seller:currentSeller,created_at:existing.created_at||new Date().toISOString()};
  const btn=document.getElementById('saveOrderBtn');btn.disabled=true;btn.textContent='Saving...';
  // Sync stock to containers
  const ok = await syncOrderToContainers(rec, existing.id ? existing : null);
  if (!ok) { btn.disabled=false; btn.textContent='✓ '+(editOrderId?'Save changes':'Create order'); return; }
  await dbSave('orders',rec);
  if(editOrderId)orders=orders.map(o=>o.id===editOrderId?rec:o);else orders.unshift(rec);
  orderView='list';editOrderId=null;orderItems=[];renderOrders();showToast('✓ Order saved — stock updated!');
}

// ── SHIPPING TRACKER ─────────────────────────────────────────────────────────


function openShippingTracker(id) {
  const c = containers.find(x => x.id === id);
  if (!c) return;
  const shipping = c.shipping || {};
  const currentStep = shipping.currentStep || 'factory';
  const stepIdx = SHIPPING_STEPS.findIndex(s => s.key === currentStep);

  document.getElementById('formModal').innerHTML = `
    <h2>🚢 Shipping tracker — <span style="font-family:monospace;font-size:14px">${c.container_no}</span></h2>
    <div class="timeline">
      ${SHIPPING_STEPS.map((step, i) => {
        const isDone = i < stepIdx;
        const isActive = i === stepIdx;
        return `<div class="tl-step">
          <div class="tl-dot ${isDone?'done':isActive?'active':'pending'}"></div>
          <div class="tl-line"></div>
          <div style="flex:1">
            <div style="font-weight:${isActive?'700':'500'};font-size:14px;color:${isDone?'#3B6D11':isActive?'#185FA5':'#888'}">${step.icon} ${step.label}</div>
            ${shipping['date_'+step.key]?`<div style="font-size:11px;color:#888;margin-top:2px">${fmt(shipping['date_'+step.key])}</div>`:''}
            ${shipping['note_'+step.key]?`<div style="font-size:12px;color:#444;margin-top:2px;font-style:italic">${shipping['note_'+step.key]}</div>`:''}
          </div>
          ${!isDone?`<button class="btn sm ${isActive?'success':'inv'}" data-stepkey="${step.key}" data-stepidx="${i}" style="flex-shrink:0">${isActive?'✓ Current':'Set active'}</button>`:'<span style="color:#3B6D11;font-size:12px">✓ Done</span>'}
        </div>`;
      }).join('')}
    </div>
    <div class="fg full" style="margin-top:1rem">
      <label>Notes for current status</label>
      <input id="ship_note" placeholder="e.g. Expected arrival Dec 25" value="${shipping['note_'+currentStep]||''}">
    </div>
    <div class="fg" style="margin-top:10px">
      <label>Expected arrival date</label>
      <input type="date" id="ship_eta" value="${shipping.eta||c.arrival_date||''}">
    </div>
    <div class="modal-footer">
      <button class="btn" id="cancelShipBtn">Cancel</button>
      <button class="btn primary" id="saveShipBtn">✓ Save status</button>
    </div>`;

  document.getElementById('formOverlay').classList.add('open');
  document.getElementById('cancelShipBtn').onclick = () => document.getElementById('formOverlay').classList.remove('open');
  
  document.querySelectorAll('[data-stepkey]').forEach(btn => {
    btn.onclick = async () => {
      const key = btn.dataset.stepkey;
      const today = new Date().toISOString().slice(0,10);
      if (!c.shipping) c.shipping = {};
      c.shipping.currentStep = key;
      c.shipping['date_'+key] = today;
      c.shipping['note_'+key] = document.getElementById('ship_note').value.trim();
      c.shipping.eta = document.getElementById('ship_eta').value;
      await dbSave('containers', c);
      containers = containers.map(x => x.id === id ? c : x);
      document.getElementById('formOverlay').classList.remove('open');
      showToast('✓ Shipping status updated!');
      renderApp();
    };
  });

  document.getElementById('saveShipBtn').onclick = async () => {
    if (!c.shipping) c.shipping = {};
    c.shipping['note_'+currentStep] = document.getElementById('ship_note').value.trim();
    c.shipping.eta = document.getElementById('ship_eta').value;
    await dbSave('containers', c);
    containers = containers.map(x => x.id === id ? c : x);
    document.getElementById('formOverlay').classList.remove('open');
    showToast('✓ Saved!');
  };
}

function getClientStats(clientName) {
  const clientOrders = orders.filter(o => o.client_name.toLowerCase() === clientName.toLowerCase());
  const totalSpent = clientOrders.reduce((s,o) => s+Number(o.total_usd||0), 0);
  const totalPaid = clientOrders.reduce((s,o) => s+paidTotal(o), 0);
  const totalBalance = clientOrders.reduce((s,o) => s+balanceDue(o), 0);
  const lastOrder = clientOrders.sort((a,b) => (b.order_date||'').localeCompare(a.order_date||''))[0];
  return { orderCount: clientOrders.length, totalSpent, totalPaid, totalBalance, lastOrder };
}

              <div class="amount-box"><label>Total paid</label><strong style="color:#3B6D11">$${stats.totalPaid.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</strong></div>
              <div class="amount-box"><label>Balance due</label><strong style="color:${stats.totalBalance>0?'#BA7517':'#3B6D11'}">$${stats.totalBalance.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</strong></div>
              ${stats.lastOrder?'<div class="amount-box"><label>Last order</label><strong>'+fmt(stats.lastOrder.order_date)+'</strong></div>':''}
            </div>` : ''}
            ${c.notes?'<div style="font-size:12px;color:#888;margin-top:8px;font-style:italic">'+c.notes+'</div>':''}
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
              ${c.phone?'<button class="wa-client-btn" data-wac="'+c.id+'">📲 WhatsApp</button>':''}
              <button class="btn sm success" data-neworder="${c.name}">+ New order</button>
              <button class="btn sm" data-editc="${c.id}">✏️</button>
              <button class="btn sm danger" data-delc="${c.id}" style="margin-left:auto">🗑</button>
            </div>
          </div>`;
        }).join('')}
    </div>`;

  document.getElementById('addClientBtn').onclick = () => openClientForm(null);
  document.getElementById('csrch').oninput = e => { clientSearch = e.target.value; renderClients(); };
  document.querySelectorAll('[data-wac]').forEach(b => b.onclick = () => {
    const c = clients.find(x => x.id === b.dataset.wac);
    if (c && c.phone) { const num = c.phone.replace(/[^0-9+]/g,''); window.open('https://wa.me/57'+num,'_blank'); }
  });
  document.querySelectorAll('[data-neworder]').forEach(b => b.onclick = () => {
    currentTab = 'orders'; editOrderId = null; orderItems = [];
    // Pre-fill client name
    orderView = 'form'; renderOrders();
    setTimeout(() => { const el = document.getElementById('oc_name'); if(el){el.value=b.dataset.neworder;} }, 100);
  });
  document.querySelectorAll('[data-editc]').forEach(b => b.onclick = () => openClientForm(b.dataset.editc));
  document.querySelectorAll('[data-delc]').forEach(b => b.onclick = () => {
    if (!confirm('Delete this client?')) return;
    clients = clients.filter(c => c.id !== b.dataset.delc);
    saveClients(); renderClients(); showToast('Client deleted');
  });
}

  document.getElementById('formModal').innerHTML = `

    <div class="form-grid">
      <div class="fg full"><label>Company / Client name *</label><input id="cf_name" placeholder="e.g. Mármoles González" value="${c.name||''}"></div>
      <div class="fg"><label>Phone / WhatsApp</label><input id="cf_phone" placeholder="+57 300 000 0000" value="${c.phone||''}"></div>

// ── PRICE LIST ────────────────────────────────────────────────────────────────

// ── QUOTATION GENERATOR ───────────────────────────────────────────────────────
function openQuoteForm() {
  quoteItems = [];
  document.getElementById('formModal').innerHTML = `
    <h2>📄 Generate quote</h2>
    <div class="form-grid" style="margin-bottom:1rem">
      <div class="fg full"><label>Client name</label><input id="q_client" placeholder="Client company name"></div>
      <div class="fg"><label>Quote date</label><input type="date" id="q_date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label>Currency</label><select id="q_currency"><option value="USD">USD</option><option value="COP">COP</option></select></div>
      <div class="fg full"><label>Notes</label><input id="q_notes" placeholder="Delivery time, terms, validity..."></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong style="font-size:13px">Products</strong>
      <button class="btn sm primary" id="addQuoteItemBtn">+ Add product</button>
    </div>
    <div id="quoteItemsSection"></div>
    <div class="modal-footer">
      <button class="btn" id="cancelQuoteBtn">Cancel</button>
      <button class="btn success" id="genQuoteBtn">📄 Generate & Share</button>
    </div>`;
  document.getElementById('formOverlay').classList.add('open');
  document.getElementById('cancelQuoteBtn').onclick = () => document.getElementById('formOverlay').classList.remove('open');
  document.getElementById('addQuoteItemBtn').onclick = () => { quoteItems.push({priceId:'',qty:'',discount:''}); renderQuoteItems(); };
  document.getElementById('genQuoteBtn').onclick = generateQuote;
  renderQuoteItems();
}

function renderQuoteItems() {
  const sec = document.getElementById('quoteItemsSection');
  if (!sec) return;
  if (quoteItems.length === 0) { sec.innerHTML = '<p style="font-size:13px;color:#888;text-align:center;padding:1rem">Add products above</p>'; return; }
  const cur = gv('q_currency') || 'USD';
  let total = 0;
  sec.innerHTML = quoteItems.map((it, i) => {
    const p = priceList.find(x => x.id === it.priceId);
    const unitPrice = p ? (cur==='COP'?Number(p.priceCOP||0):Number(p.priceUSD||0)) : 0;
    const disc = Number(it.discount||0);
    const finalPrice = unitPrice * (1 - disc/100);
    const subtotal = finalPrice * Number(it.qty||0);
    total += subtotal;
    return `<div class="quote-item-row">
      <select class="qi-product" data-i="${i}" style="font-size:12px;height:34px;border:0.5px solid #ccc;border-radius:8px;padding:0 8px;font-family:inherit">
        <option value="">Select product...</option>
        ${priceList.map(pr=>`<option value="${pr.id}"${it.priceId===pr.id?' selected':''}>${pr.colorName} ${pr.finish||''} ${pr.thickness||''} — $${cur==='COP'?Number(pr.priceCOP||0).toLocaleString('es-CO'):Number(pr.priceUSD||0).toFixed(2)}/m²</option>`).join('')}
      </select>
      <input type="number" class="qi-qty" data-i="${i}" value="${it.qty||''}" placeholder="m²" style="width:60px;height:34px;border:0.5px solid #ccc;border-radius:8px;padding:0 6px;font-size:13px;font-family:inherit">
      <input type="number" class="qi-disc" data-i="${i}" value="${it.discount||''}" placeholder="%" style="width:50px;height:34px;border:0.5px solid #ccc;border-radius:8px;padding:0 6px;font-size:13px;font-family:inherit" title="Discount %">
      <div style="text-align:right;font-size:12px;font-weight:600;min-width:60px">${subtotal>0?'$'+subtotal.toFixed(2):'—'}</div>
      <button class="btn sm danger qi-del" data-i="${i}">🗑</button>
    </div>`;
  }).join('') + (total>0?`<div style="text-align:right;font-size:14px;font-weight:700;color:#185FA5;padding:8px 0;border-top:0.5px solid #e0e0da;margin-top:4px">Total: ${cur==='COP'?'$'+total.toLocaleString('es-CO')+' COP':'$'+total.toFixed(2)+' USD'}</div>`:'');

  document.querySelectorAll('.qi-product').forEach(s => s.onchange = e => { quoteItems[Number(e.target.dataset.i)].priceId = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-qty').forEach(i => i.oninput = e => { quoteItems[Number(e.target.dataset.i)].qty = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-disc').forEach(i => i.oninput = e => { quoteItems[Number(e.target.dataset.i)].discount = e.target.value; renderQuoteItems(); });
  document.querySelectorAll('.qi-del').forEach(b => b.onclick = () => { quoteItems.splice(Number(b.dataset.i),1); renderQuoteItems(); });
}

function generateQuote() {
  const clientName = gv('q_client') || 'Client';
  const date = gv('q_date') || new Date().toISOString().slice(0,10);
  const cur = gv('q_currency') || 'USD';
  const notes = gv('q_notes');
  const quoteNo = 'Q-' + Date.now().toString().slice(-6);

  let lines = [];
  let total = 0;
  quoteItems.forEach(it => {
    const p = priceList.find(x => x.id === it.priceId);
    if (!p || !it.qty) return;
    const unitPrice = cur==='COP'?Number(p.priceCOP||0):Number(p.priceUSD||0);
    const disc = Number(it.discount||0);
    const finalPrice = unitPrice * (1 - disc/100);
    const subtotal = finalPrice * Number(it.qty);
    total += subtotal;
    lines.push(`• ${p.colorName} ${p.finish||''} ${p.thickness||''}: ${it.qty} m² × ${cur==='COP'?'$'+finalPrice.toLocaleString('es-CO'):'$'+finalPrice.toFixed(2)}/m² = ${cur==='COP'?'$'+subtotal.toLocaleString('es-CO'):'$'+subtotal.toFixed(2)} ${cur}${disc>0?' ('+disc+'% discount)':''}`);
  });

  if (lines.length === 0) { alert('Add at least one product to the quote.'); return; }

  const text = [
    '*COTIZACIÓN ' + quoteNo + '*',
    'Groupitaly — Importadores de Piedra Natural',
    '',
    '*Cliente:* ' + clientName,
    '*Fecha:* ' + fmt(date),
    '',
    '*Productos:*',
    lines.join('\n'),
    '',
    '*TOTAL: ' + (cur==='COP' ? '$'+total.toLocaleString('es-CO')+' COP' : '$'+total.toFixed(2)+' USD') + '*',
    '',
    notes ? '*Notas:* '+notes : '',
    '_Precios válidos por 7 días. Sujeto a disponibilidad de stock._',
    '_Groupitaly — https://groupitaly.github.io/TRACKER_'
  ].filter(l => l !== undefined).join('\n');

  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  document.getElementById('formOverlay').classList.remove('open');
  showToast('✓ Quote sent to WhatsApp!');
}


// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[];
  containers.forEach(c=>{
    if(!c.items||!c.items.length){rows.push([c.container_no,c.material||'',c.client||'',c.origin||'','','','','','',sKey(c)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));}
    else{c.items.forEach(it=>rows.push([c.container_no,c.material||'',c.client||'',c.origin||'',it.colorName||'',it.finish||'',it.thickness||'',Number(it.qty||0).toFixed(1),availQty(it).toFixed(1),sKey(c)].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')));}
  });
  const h='"Container #","Material","Client","Origin","Color","Finish","Thickness","Total m²","Available m²","Status"';
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([h,...rows].join('\n'));a.download='stock_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
